name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - typescript
          - python
          - both
      git-ref:
        description: 'Git ref (tag, branch, or commit SHA) to publish from'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.package == 'typescript' || github.event.inputs.package == 'both' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript package
        run: npm run build

      - name: Publish to npm
        id: npm_publish
        working-directory: packages/flarelette-jwt-ts
        run: npm publish --provenance --access public

      - name: Upload npm debug logs (on failure)
        if: failure() && steps.npm_publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*
          if-no-files-found: warn
          retention-days: 14

  publish-pypi:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.package == 'python' || github.event.inputs.package == 'both' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Python package
        working-directory: packages/flarelette-jwt-py
        run: |
          python prepare.py
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/flarelette-jwt-py/dist/
