name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - typescript
          - python
          - both
      git-ref:
        description: 'Git ref (tag, branch, or commit SHA) to publish from'
        required: true
        default: 'main'

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.package == 'typescript' || github.event.inputs.package == 'both' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript package
        run: npm run build

      - name: Preflight OIDC availability
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "OIDC token request URL is missing (check id-token: write permissions)."
            exit 1
          fi
          echo "OIDC environment is available."

      - name: OIDC token check
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC request token is missing (check id-token: write permissions)."
            exit 1
          fi
          curl -fsS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" > /tmp/oidc.json
          echo "OIDC token fetch OK"

      - name: Publish to npm
        id: npm_publish
        working-directory: packages/flarelette-jwt-ts
        run: |
          unset NODE_AUTH_TOKEN
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "${NPM_CONFIG_USERCONFIG}" ]; then
            rm -f "${NPM_CONFIG_USERCONFIG}"
          fi
          npm publish --provenance --access public --registry=https://registry.npmjs.org

      - name: Upload npm debug logs (on failure)
        if: failure() && steps.npm_publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*
          if-no-files-found: warn
          retention-days: 14


      - name: Upload npm debug logs (on failure)
        if: failure() && steps.npm_publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*
          if-no-files-found: warn
          retention-days: 14

  publish-pypi:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.package == 'python' || github.event.inputs.package == 'both' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Python package
        working-directory: packages/flarelette-jwt-py
        run: |
          python prepare.py
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/flarelette-jwt-py/dist/
